name: CI

on:
  push:
    branches:
      - main
      - "claude/*"
  pull_request:
    branches:
      - main
      - "claude/*"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e "./dach_momentum/[dev]"

      - name: Ruff check
        run: ruff check dach_momentum/

      - name: Ruff format check
        run: ruff format --check dach_momentum/

      - name: Run pytest
        continue-on-error: true
        run: pytest
